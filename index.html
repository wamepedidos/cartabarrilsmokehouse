<!DOCTYPE html>
<html lang="es">
<head>
  <!-- META BÁSICOS -->
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <!-- SEO -->
  <title>Barril Smoke House | Carta Digital Premium</title>
  <meta
    name="description"
    content="Disfruta costillas BBQ, platos ahumados, bebidas y postres. Ordena fácil desde nuestra carta digital."
  />
  <meta
    name="theme-color"
    content="#ea580c"
  />

  <!-- ICONO -->
  <link rel="icon" type="image/png" href="img/Logo.png" />

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICONOS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- PRELOAD IMAGENES IMPORTANTES -->
  <link
    rel="preload"
    as="image"
    href="img/restaurant.jpg"
  />

  <link
    rel="preload"
    as="image"
    href="img/Logo.png"
  />
</head>
<body class="bg-[#fffaf4] text-stone-800 overflow-x-hidden">

  <!-- HERO -->
  <section class="relative h-[48vh] sm:h-[55vh] md:h-[65vh] overflow-hidden">

    <!-- Imagen fondo -->
    <img
      src="img/restaurant.jpg"
      class="absolute inset-0 w-full h-full object-cover"
      alt="restaurant"
    />

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/45"></div>

    <!-- Glow -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/10"></div>

    <!-- Contenido -->
    <div class="relative z-10 h-full flex flex-col justify-center items-center text-center px-4 sm:px-6">

      <!-- Logo -->
      <div class="w-24 h-24 sm:w-32 sm:h-32 md:w-56 md:h-56 rounded-full bg-black/75 backdrop-blur-md shadow-2xl p-2 sm:p-3 mb-4 sm:mb-6 border border-white/30">
        <img
          src="img/Logo.png"
          alt="Logo restaurante"
          class="w-full h-full object-contain rounded-full"
        />
      </div>

      <!-- Texto -->
      <div class="backdrop-blur-md bg-white/10 rounded-[1.5rem] sm:rounded-[2rem] px-5 sm:px-8 py-5 sm:py-8 border border-white/20 shadow-2xl max-w-4xl w-full mx-2">
        <h1 class="text-3xl sm:text-4xl md:text-6xl font-black text-white tracking-tight">
          Nuestro Menú
        </h1>

        <p class="mt-2 sm:mt-3 text-base sm:text-xl md:text-2xl text-white/90 leading-relaxed">
          Platos ahumados, bebidas y postres listos para ordenar
        </p>

        <!-- Redes -->
        <div class="mt-5 flex gap-3 overflow-x-auto no-scrollbar px-1 max-w-full justify-start sm:justify-center">

          <a href="https://facebook.com/TU_PAGINA" target="_blank"
             class="social-btn btn-facebook min-w-max">
            <i class="fa-brands fa-facebook-f"></i>
            Facebook
          </a>

          <a href="https://instagram.com/TU_USUARIO" target="_blank"
             class="social-btn btn-instagram min-w-max">
            <i class="fa-brands fa-instagram"></i>
            Instagram
          </a>

          <a href="https://wa.me/573045818262" target="_blank"
             class="social-btn btn-whatsapp min-w-max">
            <i class="fa-brands fa-whatsapp"></i>
            WhatsApp
          </a>

          <a href="https://g.page/r/TU_NEGOCIO" target="_blank"
             class="social-btn btn-google min-w-max">
            <i class="fa-brands fa-google"></i>
            Google
          </a>

          <button onclick="openLocationOptions()"
                  class="social-btn btn-location min-w-max">
            <i class="fa-solid fa-location-dot"></i>
            Ubicación
          </button>

        </div>
      </div>
    </div>
  </section>
 <!-- NOVEDADES -->
<section class="max-w-7xl mx-auto px-4 py-6 sm:py-8">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <h2 class="text-2xl sm:text-3xl font-black text-stone-800">
        ✨ Novedades
      </h2>

      <span class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-black shadow-sm animate-pulse">
        NUEVO
      </span>
    </div>

    <span class="text-xs sm:text-sm text-stone-400 font-semibold">
      Ver más →
    </span>
  </div>

  <!-- SUBTÍTULO -->
  <p class="text-sm sm:text-base text-stone-500 mb-4 leading-relaxed">
    Promociones, noticias y platos destacados
  </p>

  <!-- STORIES -->
  <div
    id="storiesContainer"
    class="flex gap-3 sm:gap-4 overflow-x-auto no-scrollbar pb-3 snap-x snap-mandatory"
  ></div>
</section>

<!-- DIVISOR -->
<div class="max-w-7xl mx-auto px-4">
  <div class="section-divider"></div>
</div>

<!-- PLATOS -->
<section class="max-w-7xl mx-auto px-4 py-6">

  <!-- HEADER CARD -->
  <div class="bg-white rounded-[1.5rem] sm:rounded-[2rem] shadow-xl border border-stone-200 px-5 sm:px-6 py-5 sm:py-6 mb-5">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center shadow-lg">
        <span class="text-xl sm:text-2xl">🍖</span>
      </div>

      <div>
        <h2 class="text-3xl sm:text-4xl font-black text-stone-900">
          Platos
        </h2>

        <p class="text-stone-500 text-sm mt-1">
          Especialidades ahumadas de la casa
        </p>
      </div>
    </div>
  </div>

  <!-- CATEGORÍAS -->
  <div class="sticky top-0 z-40 bg-white/95 backdrop-blur-lg rounded-2xl border border-stone-200 shadow-sm px-3 py-3 overflow-x-auto no-scrollbar">
    <div class="flex gap-3 min-w-max">

      <button onclick="filterCategory('todos', this)"
        class="category-btn active-category min-w-max">
        Todos
      </button>

      <button onclick="filterCategory('entradas', this)"
        class="category-btn min-w-max">
        Entradas
      </button>

      <button onclick="filterCategory('fuertes', this)"
        class="category-btn min-w-max">
        Fuertes
      </button>

      <button onclick="filterCategory('postres', this)"
        class="category-btn min-w-max">
        Postres
      </button>

      <button onclick="filterCategory('bebidas', this)"
        class="category-btn min-w-max">
        Bebidas
      </button>

    </div>
  </div>

</section>
  
  <!-- MENÚ -->
<main class="max-w-7xl mx-auto px-4 py-6 sm:py-10">
  <div
    id="menuContainer"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-8"
  ></div>
</main>

<!-- PANEL PEDIDO -->
<section class="max-w-4xl mx-auto px-4 pb-32 sm:pb-28">
  <div class="bg-white rounded-[1.5rem] sm:rounded-[2rem] shadow-2xl border border-stone-200 p-5 sm:p-8">

    <!-- TÍTULO -->
    <h2 class="text-2xl sm:text-3xl font-black mb-6">
      🛒 Tu Pedido
    </h2>

    <!-- PRODUCTOS -->
    <div
      id="orderSummary"
      class="space-y-3 max-h-[260px] overflow-y-auto pr-1"
    ></div>

    <!-- TOTAL -->
    <div class="flex justify-between items-center mt-6 pt-4 border-t border-stone-200">
      <p class="text-base sm:text-lg font-semibold text-stone-600">
        Total
      </p>

      <p id="totalPrice" class="text-2xl sm:text-3xl font-black price-text">
        COP $0
      </p>
    </div>

    <!-- TIPO PEDIDO -->
    <div class="mt-6 sm:mt-8">
      <label class="block text-sm font-semibold mb-2">
        Tipo de pedido *
      </label>

      <select
        id="deliveryType"
        onchange="toggleForm()"
        class="w-full rounded-2xl border border-stone-300 px-4 sm:px-5 py-4 text-base sm:text-lg shadow-sm focus:ring-2 focus:ring-orange-400 outline-none"
        required
      >
        <option value="">Selecciona</option>
        <option value="local">🍽️ Consumir en el local</option>
        <option value="domicilio">🛵 Domicilio</option>
      </select>
    </div>

    <!-- FORM LOCAL -->
    <div id="localForm" class="hidden mt-6 space-y-4">
      <input
        id="customerName"
        class="w-full rounded-2xl border px-4 sm:px-5 py-4"
        placeholder="Nombre *"
      />

      <input
        id="tableNumber"
        class="w-full rounded-2xl border px-4 sm:px-5 py-4"
        placeholder="Número de mesa"
      />
    </div>

    <!-- FORM DOMICILIO -->
    <div id="homeForm" class="hidden mt-6 space-y-4">
      <input
        id="customerNameHome"
        class="w-full rounded-2xl border px-4 sm:px-5 py-4"
        placeholder="Nombre *"
      />

      <input
        id="phoneNumber"
        class="w-full rounded-2xl border px-4 sm:px-5 py-4"
        placeholder="Teléfono *"
      />

      <input
        id="address"
        class="w-full rounded-2xl border px-4 sm:px-5 py-4"
        placeholder="Dirección *"
      />
    </div>

    <!-- CTA -->
    <button
      onclick="validateAndSendOrder()"
      class="w-full mt-6 sm:mt-8 order-btn py-4 sm:py-5 rounded-2xl font-black text-lg sm:text-xl shadow-xl transition-all hover:scale-[1.01]"
    >
      📲 Enviar pedido por WhatsApp
    </button>
  </div>
</section>

<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
</body>
</html>
